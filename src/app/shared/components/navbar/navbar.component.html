<nav class="navbar">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/home">
        <h1>BIG SHOT EVENTS</h1>
      </a>
    </div>
    
    <div class="nav-links" [class.open]="mobileMenuOpen">
      <a routerLink="/home" routerLinkActive="active" (click)="mobileMenuOpen=false">Événements</a>
      <a routerLink="/events" routerLinkActive="active" (click)="mobileMenuOpen=false">Gala</a>
      <a routerLink="/culture" routerLinkActive="active" (click)="mobileMenuOpen=false">Culture</a>
      <a routerLink="/contact" routerLinkActive="active" (click)="mobileMenuOpen=false">Contact</a>
      
      <!-- Non connecté -->
      <ng-container *ngIf="!isAuthenticated">
        <a routerLink="/login" class="nav-link-outline" (click)="mobileMenuOpen=false">Connexion</a>
        <a routerLink="/register" class="nav-link-primary" (click)="mobileMenuOpen=false">RÉSERVER</a>
      </ng-container>
      
      <!-- Participant connecté -->
      <ng-container *ngIf="isAuthenticated && !isOrganizer">
        <a routerLink="/wallet" routerLinkActive="active" (click)="mobileMenuOpen=false">Mes billets</a>
        <a routerLink="/profile" routerLinkActive="active" (click)="mobileMenuOpen=false">Profil</a>
        <div class="user-menu">
          <span class="user-name">{{ currentUser?.first_name || currentUser?.username }}</span>
          <button class="logout-btn" (click)="logout()">Déconnexion</button>
        </div>
      </ng-container>
      
      <!-- Organisateur connecté -->
      <ng-container *ngIf="isAuthenticated && isOrganizer">
        <a routerLink="/dashboard" routerLinkActive="active" (click)="mobileMenuOpen=false">Dashboard</a>
        <a routerLink="/events/create" routerLinkActive="active" (click)="mobileMenuOpen=false">Créer</a>
        <a routerLink="/scan" routerLinkActive="active" (click)="mobileMenuOpen=false">Scanner</a>
        <div class="user-menu">
          <span class="user-name">{{ currentUser?.first_name || currentUser?.username }}</span>
          <button class="logout-btn" (click)="logout()">Déconnexion</button>
        </div>
      </ng-container>
    </div>
    
    <button class="mobile-menu-btn" (click)="toggleMobileMenu()">☰</button>
  </div>
</nav>

<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <h1>BIG SHOT EVENTS</h1>
      <p>L'Excellence à la Camerounaise</p>
    </div>

    <div class="tabs">
      <button [class.active]="!isRegisterMode" (click)="setMode(false)">Connexion</button>
      <button [class.active]="isRegisterMode" (click)="setMode(true)">Inscription</button>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" *ngIf="!isRegisterMode">
      <div class="form-group">
        <label>EMAIL OU NOM D'UTILISATEUR</label>
        <input type="text" formControlName="username" placeholder="ex: emmanuel.n@gmail.com">
        <div class="error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Champ requis
        </div>
      </div>

      <div class="form-group">
        <label>MOT DE PASSE</label>
        <input type="password" formControlName="password">
        <div class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Champ requis
        </div>
      </div>

      <div class="form-options">
        <label class="checkbox">
          <input type="checkbox"> Se souvenir de moi
        </label>
        <a href="#" class="forgot-password">Mot de passe oublié ?</a>
      </div>

      <button type="submit" class="btn-login" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Connexion...' : 'Se connecter' }}
      </button>
    </form>

    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" *ngIf="isRegisterMode">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" formControlName="first_name" placeholder="Ex: Marc">
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" formControlName="last_name" placeholder="Ex: Mbarga">
        </div>
      </div>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="@votre_nom">
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" formControlName="email" placeholder="votre@email.com">
      </div>

      <div class="form-group">
        <label>Votre Profil</label>
        <div class="role-selector">
          <button type="button" [class.active]="registerForm.get('role')?.value === 'participant'" (click)="registerForm.patchValue({ role: 'participant' })">
            PARTICIPANT
          </button>
          <button type="button" [class.active]="registerForm.get('role')?.value === 'organizer'" (click)="registerForm.patchValue({ role: 'organizer' })">
            ORGANISATEUR
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password">
        <div class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Minimum 6 caractères
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer</label>
        <input type="password" formControlName="password2">
      </div>

      <button type="submit" class="btn-login" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <div class="divider">
      <span>OU CONTINUER AVEC</span>
    </div>

    <button class="btn-google">
      <span>G</span> Google
    </button>

    <p class="security-note">CONNEXION SÉCURISÉE VIA JWT</p>
  </div>
</div>

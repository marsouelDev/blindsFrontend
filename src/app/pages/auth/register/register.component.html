<div class="register-container">
  <div class="register-card">
    <div class="logo">
      <h1>Blind'Events</h1>
      <p>Rejoignez l'Excellence</p>
      <span>Créez votre compte pour accéder aux événements les plus prestigieux du Cameroun.</span>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <input type="text" formControlName="first_name" placeholder="Ex: Marc">
          <div class="error" *ngIf="registerForm.get('first_name')?.invalid && registerForm.get('first_name')?.touched">
            Champ requis
          </div>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <input type="text" formControlName="last_name" placeholder="Ex: Mbarga">
          <div class="error" *ngIf="registerForm.get('last_name')?.invalid && registerForm.get('last_name')?.touched">
            Champ requis
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" formControlName="username" placeholder="@votre_nom">
        <div class="error" *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
          Minimum 3 caractères
        </div>
      </div>

      <div class="form-group">
        <label>E-mail</label>
        <input type="email" formControlName="email" placeholder="votre@email.com">
        <div class="error" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email valide requis
        </div>
      </div>

      <div class="form-group">
        <label>Votre Profil</label>
        <div class="role-selector">
          <button type="button" [class.active]="registerForm.get('role')?.value === 'participant'" (click)="registerForm.patchValue({ role: 'participant' })">
            PARTICIPANT
          </button>
          <button type="button" [class.active]="registerForm.get('role')?.value === 'organizer'" (click)="registerForm.patchValue({ role: 'organizer' })">
            ORGANISATEUR
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" formControlName="password" placeholder="Minimum 6 caractères">
        <div class="error" *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Minimum 6 caractères
        </div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" formControlName="password2">
        <div class="error" *ngIf="registerForm.errors?.['mismatch']">
          Les mots de passe ne correspondent pas
        </div>
      </div>

      <button type="submit" class="btn-register" [disabled]="registerForm.invalid || isLoading">
        {{ isLoading ? 'Inscription...' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="login-link">
      Déjà inscrit ? <a routerLink="/login">Se connecter</a>
    </p>
  </div>
</div>

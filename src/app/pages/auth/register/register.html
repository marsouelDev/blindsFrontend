<div class="auth-page">
  <div class="auth-card">
    <h1 class="logo">BIG SHOT EVENTS</h1>
    <h2>Rejoignez l'Excellence</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="row">
        <input placeholder="Prénom" [(ngModel)]="prenom" name="prenom" required>
        <input placeholder="Nom" [(ngModel)]="nom" name="nom" required>
      </div>
      <input placeholder="Nom d'utilisateur" [(ngModel)]="username" name="username" required>
      <input type="email" placeholder="E-mail" [(ngModel)]="email" name="email" required>
      <div class="role-select">
        <label><input type="radio" value="PARTICIPANT" [(ngModel)]="role" name="role"> PARTICIPANT</label>
        <label><input type="radio" value="ORGANISATEUR" [(ngModel)]="role" name="role"> ORGANISATEUR</label>
      </div>
      <input type="password" placeholder="Mot de passe" [(ngModel)]="password" name="password" required>
      <input type="password" placeholder="Confirmer" [(ngModel)]="confirmPassword" name="confirmPassword" required>
      <button type="submit" class="btn-primary">Créer mon compte</button>
    </form>
    <p>Déjà inscrit ? <a routerLink="/login">Se connecter</a></p>
  </div>
</div>

<div class="payment-chart">
  <div class="payment-bar">
    <div class="bar orange" [style.width.%]="(dashboardStats?.payment_split?.orange_money?.pct || 0)"></div>
    <div class="bar mtn" [style.width.%]="(dashboardStats?.payment_split?.mtn_momo?.pct || 0)"></div>
  </div>
  <div class="payment-labels">
    <span class="orange-label">Orange Money {{ dashboardStats?.payment_split?.orange_money?.pct || 0 }}%</span>
    <span class="mtn-label">MTN MoMo {{ dashboardStats?.payment_split?.mtn_momo?.pct || 0 }}%</span>
  </div>
</div>
